<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Hero — Super Word Adventure!</title>
    <meta name="description"
        content="A fun vocabulary learning game for kids! Upload a book page and learn super words with flashcards and spelling challenges.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Quicksand:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fef9c3 0%, #fce7f3 40%, #dbeafe 80%, #d1fae5 100%);
            min-height: 100vh;
        }

        .hero-font {
            font-family: 'Bangers', cursive;
        }

        .perspective-1000 {
            perspective: 1000px;
        }

        .flip-card-inner {
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
        }

        .flip-card-flipped {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 2rem;
            /* Safari fallback: also use z-index toggling */
            z-index: 1;
        }

        .flip-card-back {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
            z-index: 0;
        }

        /* Safari extra protection: hide via visibility when flipped */
        .flip-card-flipped .flip-card-front {
            visibility: hidden;
            pointer-events: none;
        }

        .flip-card-flipped .flip-card-back {
            z-index: 2;
        }

        /* Hero Reward Animations */
        @keyframes hero-glow {
            0% {
                box-shadow: 0 0 10px #fbbf24, 0 0 20px #f472b6;
                border-color: #fbbf24;
            }

            50% {
                box-shadow: 0 0 30px #f59e0b, 0 0 50px #ec4899;
                border-color: #f59e0b;
            }

            100% {
                box-shadow: 0 0 10px #fbbf24, 0 0 20px #f472b6;
                border-color: #fbbf24;
            }
        }

        .hero-success-glow {
            animation: hero-glow 1s infinite ease-in-out;
        }

        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(0) rotate(0) scale(1);
                opacity: 1;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateY(400px) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }

        .animate-confetti {
            animation: confetti-fall 2s forwards ease-out;
        }

        /* Star shapes for confetti variety */
        .confetti-star {
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
    <link rel="stylesheet" href="./index.css">
</head>

<body class="selection:bg-pink-200">
    <div id="root"></div>

</body>

</html>
